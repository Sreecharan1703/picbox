<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Upload Picture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f8f4;
            color: #14211a;
            min-height: 100vh;
        }
        .nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 22px 60px; background: #fff; border-bottom: 1px solid #e3ede6;
        }
        .logo {
            font-size: 24px; font-weight: 800; color: #16a34a;
            display: flex; align-items: center; gap: 8px;
        }
        .logo::before {
            content: ""; width: 22px; height: 22px;
            background: linear-gradient(135deg, #22c55e, #15803d);
            clip-path: polygon(40% 0, 100% 0, 60% 100%, 0 100%);
        }
        .back {
            color: #16a34a; text-decoration: none; font-weight: 600; font-size: 14px;
        }
        .container {
            max-width: 560px;
            margin: 80px auto;
            padding: 0 24px;
        }
        .card {
            background: #fff;
            border: 1px solid #e3ede6;
            border-radius: 18px;
            padding: 44px;
            box-shadow: 0 10px 30px rgba(20, 33, 26, 0.04);
        }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
        h1 .accent { color: #16a34a; }
        .subtitle { color: #4a5d52; margin-bottom: 32px; font-size: 15px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2a3d31;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .file-zone {
            border: 2px dashed #b6dcc1;
            background: #f1f8f4;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color .15s ease, background .15s ease;
            margin-bottom: 22px;
            position: relative;
        }
        .file-zone:hover { border-color: #16a34a; background: #e7f4ec; }
        .file-zone input[type=file] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
        }
        .file-zone .icon {
            font-size: 32px; color: #16a34a; margin-bottom: 8px;
        }
        .file-zone .hint { color: #4a5d52; font-size: 14px; }
        .file-zone .name { color: #14211a; font-weight: 600; margin-top: 6px; }

        input[type=text] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d6e6dc;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            background: #fff;
            transition: border-color .15s ease, box-shadow .15s ease;
            margin-bottom: 28px;
        }
        input[type=text]:focus {
            outline: none;
            border-color: #16a34a;
            box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
        }

        button[type=submit] {
            width: 100%;
            background: #16a34a;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 8px 20px rgba(22, 163, 74, 0.25);
            transition: background .15s ease, transform .15s ease;
        }
        button[type=submit]:hover { background: #15803d; transform: translateY(-1px); }

        @media (max-width: 600px) {
            .nav { padding: 18px 24px; }
            .card { padding: 28px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="logo" >Upload...</div>
        <a class="back" href="/main">← Back</a>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Upload a <span class="accent">picture</span></h1>
            <p class="subtitle">Pick a file from your device and add description to find it later.</p>

            <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
                <label>File</label>
                <div class="file-zone" id="dropZone">
                    <div class="icon">⤴</div>
                    <div class="hint">Click to choose a picture</div>
                    <div class="name" id="fileName"></div>
                    <input type="file" name="file" id="fileInput" required />
                </div>

                <label>Description</label>
                <input type="text" name="description" placeholder="Describe the picture (optional)" />

                <button type="submit">Upload to Drive</button>
            </form>
        </div>
    </div>

    <script>
        const input = document.getElementById('fileInput');
        const nameEl = document.getElementById('fileName');
        input.addEventListener('change', () => {
            nameEl.textContent = input.files[0] ? input.files[0].name : '';
        });
    </script>
</body>
</html>
