<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f8f4;
            color: #14211a;
            min-height: 100vh;
        }
        .nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 22px 60px; background: #fff; border-bottom: 1px solid #e3ede6;
        }
        .logo {
            font-size: 24px; font-weight: 800; color: #16a34a;
            display: flex; align-items: center; gap: 8px;
        }
        .logo::before {
            content: ""; width: 22px; height: 22px;
            background: linear-gradient(135deg, #22c55e, #15803d);
            clip-path: polygon(40% 0, 100% 0, 60% 100%, 0 100%);
        }
        .nav-actions { display: flex; gap: 12px; align-items: center; }
        .ghost-btn {
            background: transparent;
            color: #14211a;
            border: 1px solid #d6e6dc;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
        }
        .ghost-btn:hover { border-color: #16a34a; color: #16a34a; }

        .container { max-width: 1100px; margin: 48px auto; padding: 0 24px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }
        h1 { font-size: 36px; font-weight: 800; }
        h1 .accent { color: #16a34a; }
        .header p { color: #4a5d52; margin-top: 4px; font-size: 15px; }

        .search-form {
            display: flex;
            gap: 8px;
            background: #fff;
            border: 1px solid #d6e6dc;
            border-radius: 12px;
            padding: 6px;
            transition: border-color .15s ease, box-shadow .15s ease;
        }
        .search-form:focus-within {
            border-color: #16a34a;
            box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
        }
        .search-form input {
            border: none;
            outline: none;
            padding: 10px 14px;
            font-size: 15px;
            font-family: inherit;
            background: transparent;
            min-width: 240px;
        }
        .search-form button {
            background: #16a34a;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .search-form button:hover { background: #15803d; }

        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .alert-error { background: #fde8e8; color: #b91c1c; border: 1px solid #f5c2c2; }
        .alert-success { background: #e7f4ec; color: #15803d; border: 1px solid #b6dcc1; }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
            list-style: none;
        }
        .file-card {
            background: #fff;
            border: 1px solid #e3ede6;
            border-radius: 14px;
            padding: 20px;
            transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }
        .file-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 30px rgba(22,163,74,0.1);
            border-color: #16a34a;
        }
        
        .file-checkbox {
            position: absolute;
            top: 28px;
            right: 28px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #16a34a;
            z-index: 10;
        }

        .thumb {
            height: 120px;
            border-radius: 10px;
            background: linear-gradient(135deg, #d1f0db, #86d8a1);
            display: flex; align-items: center; justify-content: center;
            color: #15803d;
            font-size: 36px;
            font-weight: 800;
            position: relative;
        }
        .file-name {
            font-weight: 600;
            font-size: 15px;
            color: #14211a;
            overflow-wrap: anywhere;
        }
        
        .description-box {
            display: none;
            font-size: 13px;
            color: #4a5d52;
            background: #f1f8f4;
            padding: 10px;
            border-radius: 6px;
            margin-top: 4px;
        }
        .description-box.expanded { display: block; }
        
        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto; 
            padding-top: 8px;
        }

        .toggle-desc-btn {
            background: none;
            border: none;
            color: #16a34a;
            font-size: 13px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            padding: 0;
        }
        .toggle-desc-btn:hover { text-decoration: underline; }

        .download-link {
            display: inline-block;
            color: #16a34a;
            font-weight: 600;
            text-decoration: none;
            font-size: 14px;
        }
        .download-link:hover { text-decoration: underline; }

        .make-quiz-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: #fff;
            border: 1px solid #d6e6dc;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 8px 24px rgba(22,163,74,0.15);
            display: none;
            z-index: 1000;
            flex-direction: row;
            align-items: center;
            gap: 20px;
            transition: transform 0.2s ease;
        }
        .make-quiz-container.visible {
            display: flex;
        }
        
        .level-slider-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .level-slider-wrapper label {
            font-size: 14px;
            font-weight: 600;
            color: #4a5d52;
        }
        .level-slider-wrapper input[type=range] {
            accent-color: #16a34a;
            cursor: pointer;
        }

        .make-quiz-btn {
            background: #16a34a;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        .make-quiz-btn:hover {
            background: #15803d;
            transform: translateY(-2px);
        }

        .divider { height: 1px; background: #e3ede6; margin: 28px 0; border: none; }

        @media (max-width: 720px) {
            .nav { padding: 18px 24px; }
            .container { margin: 28px auto; }
            h1 { font-size: 28px; }
            .search-form input { min-width: 0; flex: 1; }
            .make-quiz-container { 
                bottom: 20px; 
                right: 20px; 
                padding: 16px; 
                flex-direction: column; 
                align-items: stretch; 
                gap: 16px;
            }
            .make-quiz-btn { padding: 12px 24px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="logo">Gallery</div>
        <div class="nav-actions">
            <a class="ghost-btn" href="/main" style="text-decoration:none; display:inline-block;">← Menu</a>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button class="ghost-btn" type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <div>
                <h1>Welcome, <span class="accent" th:text="${name}">User</span></h1>
                <p>Browse your collection or search by name.</p>
            </div>
            <form class="search-form" action='/searchfiles' method='get'>
                <input type='text' id='name' name='name' placeholder="Search your files…" required>
                <button type='submit'>Search</button>
            </form>
        </div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-success" th:if="${searchresults}" th:text="${searchresults}"></div>

        <ul class="files-grid" th:if="${resultfiles != null}">
            <li class="file-card" th:each="file : ${resultfiles}">
                <input type="checkbox" class="file-checkbox" th:value="${file.id}">
                
                <a th:href="@{/images/{id}(id=${file.id})}" target="_blank" style="text-decoration:none;">
                <div class="thumb"><img th:src="@{/images/{id}(id=${file.id})}" height="100%" width="100%" alt="▦"></div>
                </a>
                
                <div class="file-name" th:text="${file.name}">File Name</div>
                
                <div class="description-box" th:text="${file.description != null && file.description != '' ? file.description : 'No description available for this image.'}"></div>

                <div class="card-actions">
                    <button class="toggle-desc-btn" onclick="toggleDesc(this)">Show description</button>
                    <a class="download-link"
                       th:if="${!file.mimeType.startsWith('application/vnd.google-apps')}"
                       th:href="@{/download/{id}(id=${file.id})}">Download ↓</a>
                </div>
            </li>
        </ul>

        <div th:if="${resultfiles == null}">
            <ul class="files-grid">
                <li class="file-card" th:each="file : ${files}">
                    <input type="checkbox" class="file-checkbox" th:value="${file.id}">
                    
                    <a th:href="@{/images/{id}(id=${file.id})}" target="_blank" style="text-decoration:none;">
                        <div class="thumb"><img th:src="@{/images/{id}(id=${file.id})}" height="100%" width="100%" alt="▦"></div>
                    </a>

                    <div class="file-name" th:text="${file.name}">File Name</div>
                    
                    <div class="description-box" th:text="${file.description != null && file.description != '' ? file.description : 'No description available for this image.'}"></div>

                    <div class="card-actions">
                        <button class="toggle-desc-btn" onclick="toggleDesc(this)">Show description</button>
                        <a class="download-link"
                           th:if="${!file.mimeType.startsWith('application/vnd.google-apps')}"
                           th:href="@{/download/{id}(id=${file.id})}">Download ↓</a>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <div id="makeQuizContainer" class="make-quiz-container">
        <div class="level-slider-wrapper">
            <label for="quizLevel">Level: <span id="levelValue">50</span></label>
            <input type="range" id="quizLevel" min="1" max="100" value="50">
        </div>
        <button id="makeQuizBtn" class="make-quiz-btn">Make Quiz</button>
    </div>

    <script>
        function toggleDesc(btnElement) {
            const card = btnElement.closest('.file-card');
            const descBox = card.querySelector('.description-box');
            
            if (descBox.classList.contains('expanded')) {
                descBox.classList.remove('expanded');
                btnElement.textContent = "Show description";
            } else {
                descBox.classList.add('expanded');
                btnElement.textContent = "Hide description";
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('.file-checkbox');
            
            const makeQuizContainer = document.getElementById('makeQuizContainer');
            const makeQuizBtn = document.getElementById('makeQuizBtn');
            const quizLevelInput = document.getElementById('quizLevel');
            const levelValueDisplay = document.getElementById('levelValue');

            quizLevelInput.addEventListener('input', (e) => {
                levelValueDisplay.textContent = e.target.value;
            });

            const updateQuizContainerVisibility = () => {
                const anyChecked = Array.from(checkboxes).some(cb => cb.checked);
                if (anyChecked) {
                    makeQuizContainer.classList.add('visible');
                } else {
                    makeQuizContainer.classList.remove('visible');
                }
            };

            checkboxes.forEach(cb => {
                cb.addEventListener('change', updateQuizContainerVisibility);
            });
            makeQuizBtn.addEventListener('click', () => {
                const selectedIds = Array.from(checkboxes)
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);

                if (selectedIds.length > 0) {
                    const params = new URLSearchParams();
                    selectedIds.forEach(id => params.append('imageId', id));
                    params.append('level', quizLevelInput.value);
                    window.location.href = '/quiz?' + params.toString();
                }
            });
        });
    </script>
</body>
</html>
