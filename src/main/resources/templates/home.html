<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #16a34a;
            --primary-green-hover: #15803d;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; background: white; border-bottom: 1px solid #e2e8f0; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--text-dark); display: flex; align-items: center; gap: 0.5rem; }
        .logo span { color: var(--primary-green); }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 500; font-size: 0.95rem; }
        .nav-links a:hover { color: var(--primary-green); }
        
        /* Buttons */
        .btn { padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; transition: background 0.3s; font-size: 1rem; }
        .btn-primary { background-color: var(--primary-green); color: white; }
        .btn-primary:hover { background-color: var(--primary-green-hover); }
        
        /* Hero Section */
        .hero { display: flex; flex: 1; }
        .hero-content { flex: 1; padding: 6rem 5%; display: flex; flex-direction: column; justify-content: center; }
        .hero-content h1 { font-size: 3.5rem; line-height: 1.2; margin-bottom: 1.5rem; color: var(--text-dark); }
        .hero-content h1 .highlight { color: var(--primary-green); }
        .hero-content p { font-size: 1.25rem; color: var(--text-muted); margin-bottom: 2.5rem; max-width: 500px; line-height: 1.6; }
        .hero-image { flex: 1; background: url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=1000&q=80') center/cover no-repeat; }
        
        @media (max-width: 768px) {
            .hero { flex-direction: column; }
            .hero-image { min-height: 400px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><span>🖼️</span>PicBox</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
        </div>
        <button class="btn btn-primary" onclick="window.location.href='/main'">Use for free</button>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1>Welcome to the <br><span class="highlight">Home Page.</span></h1>
            <p>We bring solutions to make life easier for our customers. We have considered our solutions to support every stage of your growth.</p>
            <div>
                <button class="btn btn-primary" onclick="window.location.href='/main'">Get Started</button>
            </div>
        </div>
        <div class="hero-image"></div>
    </main>
</body>
</html>
