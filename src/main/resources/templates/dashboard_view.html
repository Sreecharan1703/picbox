<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
</head>
<body>
    <h1>Welcome, <span th:text="${name}">User</span>!</h1>
    
    <div th:if="${error}" style="color:red; margin-bottom: 20px;" th:text="${error}"></div>
    
    <h2>Upload a File</h2>
    <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required />
        <button type="submit">Upload to Drive</button>
    </form>

    <hr>

    <h2>Your Google Drive Files (Top 10):</h2>
    <ul>
        <li th:each="file : ${files}">
            <strong th:text="${file.name}">File Name</strong> 
            <a th:if="${!file.mimeType.startsWith('application/vnd.google-apps')}" 
               th:href="@{/download/{id}(id=${file.id})}">[Download]</a>
            <br>
            <small>ID: <span th:text="${file.id}">123</span></small>
        </li>
    </ul>

    <br>
    <form th:action="@{/logout}" method="post">
        <button type="submit">Logout</button>
    </form>
</body>
</html>
